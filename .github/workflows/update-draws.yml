name: 당첨번호 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 최신 당첨번호 수집
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const BASE = Date.UTC(2002, 11, 7);
            const WEEK = 7 * 24 * 60 * 60 * 1000;
            const RECENT = 12;

            async function fetchRound(n) {
              const url = `https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${n}`;
              const ctrl = new AbortController();
              const timer = setTimeout(() => ctrl.abort(), 15000);
              try {
                const res = await fetch(url, {
                  headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json' },
                  signal: ctrl.signal
                });
                const text = await res.text();
                const j = JSON.parse(text);
                if (j.returnValue !== 'success') return null;
                return {
                  round: j.drwNo,
                  date: j.drwNoDate,
                  numbers: [j.drwtNo1, j.drwtNo2, j.drwtNo3, j.drwtNo4, j.drwtNo5, j.drwtNo6],
                  bonus: j.bnusNo
                };
              } catch (e) {
                console.log(`회차 ${n} 가져오기 실패: ${e.message}`);
                return null;
              } finally {
                clearTimeout(timer);
              }
            }

            const candidate = Math.floor((Date.now() - BASE) / WEEK) + 2;
            let latest = null;
            for (let n = candidate; n > candidate - 6 && n >= 1 && !latest; n--) {
              latest = await fetchRound(n);
            }
            if (!latest) {
              core.setFailed('당첨번호를 가져오지 못했습니다 (동행복권 응답 없음/차단).');
              return;
            }
            console.log('최신 회차:', latest.round, latest.date);

            const draws = [];
            for (let n = latest.round; n > latest.round - RECENT && n >= 1; n--) {
              const d = await fetchRound(n);
              if (d) draws.push(d);
            }
            draws.sort((a, b) => b.round - a.round);

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/draws.json', JSON.stringify(draws, null, 2) + '\n');
            console.log(`data/draws.json 저장 완료 (${draws.length}개 회차)`);

      - name: 변경 사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/draws.json)" ]; then
            git add data/draws.json
            git commit -m "당첨번호 자동 업데이트"
            git push
          else
            echo "변경 사항 없음"
          fi
